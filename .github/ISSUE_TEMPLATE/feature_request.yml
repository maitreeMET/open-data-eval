name: "Feature Request"
description: "Suggest new scoring dimensions, fields, tooling, or methodology improvements"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New scoring metric
        - New catalog field
        - Methodology improvement
        - Tooling / automation
        - Interactive site
        - Robot datasets
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What would you like to see added or changed?"
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why it matters
      description: "How would this help researchers?"
