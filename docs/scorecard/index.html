<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Data Eval — Metadata Scorecard</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <style>
    /* ── reset ────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { cursor: pointer; font-family: inherit; }
    select { font-family: inherit; }

    /* ── color tokens ─────────────────────── */
    :root {
      --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;

      --c-bg:      #f8f9fb;
      --c-surface: #ffffff;
      --c-border:  #e4e7ec;
      --c-track:   #f0f2f5;
      --c-hover:   #f5f6f8;

      --c-text-1:  #0f1117;
      --c-text-2:  #4b5563;
      --c-text-3:  #9ca3af;
      --c-null:    #d1d5db;

      --c-green:    #059669;
      --c-green-bg: #ecfdf5;
      --c-amber:    #d97706;
      --c-amber-bg: #fffbeb;
      --c-red:      #dc2626;
      --c-red-bg:   #fef2f2;

      --c-blue:   #2563eb;
      --c-purple: #7c3aed;
      --c-orange: #ea580c;
    }

    /* ── base ─────────────────────────────── */
    html, body { height: 100%; background: var(--c-bg); color: var(--c-text-1); }
    body { font-family: var(--font); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    #root { min-height: 100vh; }

    /* ── scrollbar ────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 3px; }

    /* ── table ────────────────────────────── */
    table { border-collapse: collapse; }
    th, td { border: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (production UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone (transpiles JSX in-browser — fine on HTTPS/GitHub Pages) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Dataset scores (generated by eval/metadata_eval.py) -->
  <script src="./scorecard_data.js"></script>

  <!-- Scorecard component -->
  <script type="text/babel" src="./scorecard.jsx" data-presets="react"></script>
</body>
</html>
