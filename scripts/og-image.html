<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #0f1117;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    padding: 44px 52px 32px;
    overflow: hidden;
  }

  /* ── main row ── */
  .main {
    display: flex;
    align-items: center;
    gap: 36px;
    flex: 1;
    min-height: 0;
  }

  /* ── left: explicit 420px ── */
  .left {
    width: 420px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    margin-bottom: 12px;
  }
  .brand img { height: 34px; width: auto; }
  .brand-name {
    font-size: 26px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 14px;
    color: #8b949e;
    margin-bottom: 32px;
    line-height: 1.4;
  }

  /* 2×2 stats grid */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px 28px;
    margin-bottom: 28px;
  }
  .stat-block { display: flex; flex-direction: column; gap: 4px; }
  .stat-number {
    font-size: 34px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
  }
  .stat-label {
    font-size: 11.5px;
    color: #8b949e;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  .tagline {
    font-size: 12.5px;
    color: #4b5563;
    line-height: 1.5;
  }

  /* ── right: explicit 588px (1096 - 420 - 36 - buffer) ── */
  .preview-col {
    width: 588px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .preview-wrap {
    width: 588px;
    border-radius: 8px;
    border: 1px solid #30363d;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    overflow: hidden;
  }
  .preview-wrap img {
    width: 588px;
    height: auto;
    display: block;
  }

  /* ── footer ── */
  .footer {
    font-size: 11px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    color: #4b5563;
    letter-spacing: 0.2px;
    padding-top: 16px;
    border-top: 1px solid #21262d;
    margin-top: 16px;
  }
</style>
</head>
<body>
  <div class="main">
    <div class="left">
      <div class="brand">
        <img src="../docs/scorecard/logo.svg" alt="Open Data Eval" />
        <span class="brand-name">Open Data Eval</span>
      </div>
      <p class="subtitle">Systematic quality evaluation for AI/ML datasets</p>
      <div class="stats">
        <div class="stat-block">
          <span class="stat-number">106</span>
          <span class="stat-label">Datasets Audited</span>
        </div>
        <div class="stat-block">
          <span class="stat-number">26</span>
          <span class="stat-label">Quality Profiles</span>
        </div>
        <div class="stat-block">
          <span class="stat-number">135,000+</span>
          <span class="stat-label">Video Hours</span>
        </div>
        <div class="stat-block">
          <span class="stat-number">64%</span>
          <span class="stat-label">No Discoverable License</span>
        </div>
      </div>
      <p class="tagline">Every URL verified. Every license checked. Every modality documented.</p>
    </div>

    <div class="preview-col">
      <div class="preview-wrap">
        <img src="../docs/assets/scorecard-preview.png" alt="Scorecard preview" />
      </div>
    </div>
  </div>
  <div class="footer">varun-nair.github.io/open-data-eval</div>
</body>
</html>
